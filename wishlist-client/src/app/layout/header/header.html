<mat-toolbar color="primary">
  <div class="logo-container">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="logo-svg">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 11.25v8.25a1.5 1.5 0 0 1-1.5 1.5H5.25a1.5 1.5 0 0 1-1.5-1.5v-8.25M12 4.875A2.625 2.625 0 1 0 9.375 7.5H12m0-2.625V7.5m0-2.625A2.625 2.625 0 1 1 14.625 7.5H12m0 0V21m-8.625-9.75h18c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125h-18c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />
    </svg>
    <span class="logo-text">Wishlist App</span>
  </div>
  
  <div class="spacer"></div>
  
  <nav class="nav-links">
    <a mat-button routerLink="/wishlists">Все вишлисты</a>
  </nav>
  
  <nav class="nav-links" *ngIf="authService.isAuthenticated()">
    <a mat-button routerLink="/my-wishlists">Мои списки</a>
    <a mat-button routerLink="/my-bookings">Мои бронирования</a>
  </nav>
  
  <div class="auth-buttons" *ngIf="!authService.isAuthenticated()">
    <button mat-button routerLink="/login">Вход</button>
    <button mat-raised-button color="accent" routerLink="/register">Регистрация</button>
  </div>
  
  <div class="user-menu" *ngIf="authService.isAuthenticated()">
    <button mat-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
      {{ authService.getUser()?.username }}
    </button>
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item routerLink="/profile">
        <mat-icon>person</mat-icon>
        <span>Профиль</span>
      </button>
      <button mat-menu-item *ngIf="authService.isAdmin()" routerLink="/reports">
        <mat-icon>analytics</mat-icon>
        <span>Отчеты</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Выйти</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
