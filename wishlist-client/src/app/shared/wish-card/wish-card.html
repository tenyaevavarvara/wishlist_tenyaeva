<mat-card class="wish-card">
  <mat-card-header>
    <mat-card-title>{{ wishlist.name }}</mat-card-title>
    <mat-card-subtitle>Автор: {{ wishlist.ownerName }}</mat-card-subtitle>
  </mat-card-header>
  
  <mat-card-content>
    <p class="description" *ngIf="wishlist.description">{{ wishlist.description }}</p>
    <p class="description" *ngIf="!wishlist.description" class="no-description">Нет описания</p>
    
    <div class="stats">
      <mat-chip-set>
        <mat-chip>Всего: {{ wishlist.wishesCount }}</mat-chip>
        <mat-chip color="primary" highlighted *ngIf="wishlist.availableWishes > 0">
          Доступно: {{ wishlist.availableWishes }}
        </mat-chip>
        <mat-chip color="accent" highlighted *ngIf="wishlist.bookedWishes > 0">
          Забронировано: {{ wishlist.bookedWishes }}
        </mat-chip>
      </mat-chip-set>
    </div>
    
    <div class="dates">
      <small>Создан: {{ wishlist.createdAt | date:'dd.MM.yyyy' }}</small>
    </div>
  </mat-card-content>
  
  <mat-card-actions>
    <button mat-button color="primary" [routerLink]="['/wishlists', wishlist.id]">
      <mat-icon>visibility</mat-icon>
      Просмотр
    </button>
    <button mat-button color="accent" *ngIf="isOwner()" [routerLink]="['/wishlists', wishlist.id, 'edit']">
      <mat-icon>edit</mat-icon>
      Редактировать
    </button>
    <button mat-button color="warn" *ngIf="isOwner()" (click)="onDelete()">
      <mat-icon>delete</mat-icon>
      Удалить
    </button>
  </mat-card-actions>
</mat-card>
