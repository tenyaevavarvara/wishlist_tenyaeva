<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Вход в систему</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="example@mail.com">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            Email обязателен
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Введите корректный email
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Пароль</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Пароль обязателен
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Пароль должен быть не менее 6 символов
          </mat-error>
        </mat-form-field>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="loginForm.invalid || loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Войти</span>
        </button>
      </form>
    </mat-card-content>
    
    <mat-card-actions>
      <div class="register-link">
        Нет аккаунта? <a routerLink="/register">Зарегистрироваться</a>
      </div>
    </mat-card-actions>
  </mat-card>
</div>
