<h2 mat-dialog-title>{{ isEditMode ? 'Редактировать вишлист' : 'Новый вишлист' }}</h2>

<form [formGroup]="wishlistForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Название *</mat-label>
      <input matInput formControlName="name" placeholder="Например: День рождения 2026">
      <mat-error *ngIf="wishlistForm.get('name')?.hasError('required')">
        Название обязательно
      </mat-error>
      <mat-error *ngIf="wishlistForm.get('name')?.hasError('maxlength')">
        Максимум 100 символов
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Описание</mat-label>
      <textarea matInput formControlName="description" rows="3" placeholder="Краткое описание вишлиста..."></textarea>
      <mat-error *ngIf="wishlistForm.get('description')?.hasError('maxlength')">
        Максимум 500 символов
      </mat-error>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Отмена</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="wishlistForm.invalid || loading">
      <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
      <span *ngIf="!loading">{{ isEditMode ? 'Сохранить' : 'Создать' }}</span>
    </button>
  </mat-dialog-actions>
</form>
